services:
  postgres:
    image: postgres:16-alpine
    container_name: nexahub_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexahub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - nexahub_pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: nexahub_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
volumes:
  nexahub_pgdata:
services:

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: nexahub_php
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=${APP_ENV}
      - APP_KEY=${APP_KEY}
    depends_on:
      - postgres
      - redis
    networks:
      - nexahub

  nginx:
    image: nginx:alpine
    container_name: nexahub_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - nexahub

  postgres:
    image: postgres:16-alpine
    container_name: nexahub_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - nexahub_pgdata:/var/lib/postgresql/data
    networks:
      - nexahub

  redis:
    image: redis:7-alpine
    container_name: nexahub_redis
    restart: unless-stopped
    networks:
      - nexahub

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: nexahub_queue
    restart: unless-stopped
    command: sh docker/queue/worker.sh
    volumes:
      - .:/var/www/html
    depends_on:
      - postgres
      - redis
    networks:
      - nexahub

networks:
  nexahub:
    driver: bridge

volumes:
  nexahub_pgdata: